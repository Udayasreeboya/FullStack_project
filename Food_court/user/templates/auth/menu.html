<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
</head>
<body>

<h1>🍔 Food Menu</h1>

{% for item in items %}
    <div style="border:1px solid #000; padding:10px; margin:10px;">
        <h3>{{ item.name }}</h3>
        <p>{{ item.description }}</p>
        <p>₹ {{ item.price }}</p>

        <a href="/cart/add/{{ item.id }}/">Add to Cart</a>
    </div>
{% endfor %}

</body>
</html>

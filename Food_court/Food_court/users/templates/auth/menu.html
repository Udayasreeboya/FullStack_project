{% extends 'auth/base.html' %}

{% block content %}

<h2>Food Menu</h2>

<div style="display:flex; flex-wrap:wrap;">

{% for item in items %}

<div class="card">

<img src="{{ item.image.url }}">

<h3>{{ item.name }}</h3>

<p>₹ {{ item.price }}</p>

<p>{{ item.description }}</p>

<a href="{% url 'add_to_cart' item.id %}" class="btn">
Add to Cart
</a>

</div>

{% empty %}

<p>No food items available</p>

{% endfor %}

</div>

{% endblock %}

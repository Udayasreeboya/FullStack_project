<!DOCTYPE html>
<html>
<head>
<title>Udayasree Food Court</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f5f5f5;
}

.navbar{
background:#222;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin:15px;
width:220px;
display:inline-block;
box-shadow:0 0 5px gray;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.btn{
background:black;
color:white;
padding:8px 12px;
text-decoration:none;
display:inline-block;
margin-top:5px;
}

.btn:hover{
background:gray;
}

.table{
width:100%;
background:white;
}

.table th,.table td{
padding:10px;
border-bottom:1px solid #ddd;
}

.center-box{
width:300px;
margin:auto;
background:white;
padding:20px;
margin-top:50px;
}

input{
width:100%;
padding:8px;
margin:5px 0;
}

</style>

</head>

<body>

<div class="navbar">

<div>
<a href="/">Udayasree Food Court</a>
</div>

<div>

<a href="/">Menu</a>
<a href="/cart/">Cart</a>

{% if user.is_authenticated %}
<a href="/logout/">Logout</a>
{% else %}
<a href="/login/">Login</a>
{% endif %}

</div>

</div>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>

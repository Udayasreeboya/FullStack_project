<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <style>
        .food-card {
            border: 1px solid #ccc;
            padding: 15px;
            margin: 15px;
            width: 250px;
            display: inline-block;
            vertical-align: top;
            border-radius: 10px;
        }

        .food-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn {
            display: inline-block;
            padding: 8px 12px;
            background: green;
            color: white;
            text-decoration: none;
            margin-top: 10px;
            border-radius: 5px;
        }

        .btn:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

<h1 style="text-align:center;">🍽️ Food Menu</h1>

<div style="text-align:center;">

    {% for food in foods %}

        <div class="food-card">

            {% if food.image %}
                <img src="{{ food.image.url }}" alt="{{ food.name }}">
            {% endif %}

            <h3>{{ food.name }}</h3>

            <p>💰 Price: ₹{{ food.price }}</p>

            <p>{{ food.description }}</p>

            <!-- IMPORTANT FIX: food.id must not be empty -->
            <a class="btn" href="{% url 'add_to_cart' food.id %}">
                Add to Cart 🛒
            </a>
            <a href="{% url 'my_orders' %}">My Orders</a>

        </div>

    {% empty %}
        <p>No food items available.</p>
    {% endfor %}

</div>

</body>
</html>
